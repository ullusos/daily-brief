name: Daily Brief

on:
  schedule:
    # GitHub cron runs on UTC and does not follow daylight saving, so we fire
    # at both candidate times. brief.py checks the real Copenhagen clock and
    # exits immediately unless it is 07:00 there — so exactly one run publishes.
    - cron: "0 5 * * *"   # 07:00 Copenhagen, summer (CEST)
    - cron: "0 6 * * *"   # 07:00 Copenhagen, winter (CET)
  workflow_dispatch:      # lets you trigger a run by hand from the Actions tab
    inputs:
      force:
        description: "Run now even if it isn't 07:00 in Copenhagen"
        type: boolean
        default: true
      use_ai:
        description: "Spend Claude credit on written summaries (off for testing)"
        type: boolean
        default: false

permissions:
  contents: write   # commit the updated page
  issues: write     # open the notification issue

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --quiet requests feedparser

      - name: Build and publish
        run: python brief.py
        env:
          # Keeps normal output and error output in the right order in the log.
          PYTHONUNBUFFERED: "1"
          # Provided automatically by Actions — nothing for you to set up.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed if you want AI-written summaries.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional sections — each is skipped if its key is missing.
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          # Ticked on a manual run, empty on a scheduled one — so testing by
          # hand always works, while the 07:00 guard still applies at 05:00
          # and 06:00 UTC and only one of those two runs publishes.
          FORCE_RUN: ${{ inputs.force && '1' || '0' }}
          # Scheduled runs always summarise. Manual runs only if you tick the
          # box — so testing the feeds and layout costs nothing.
          SKIP_AI: ${{ github.event_name == 'workflow_dispatch' && !inputs.use_ai && '1' || '0' }}

      - name: Commit the page
        run: |
          # brief.py exits early when it is not 07:00 in Copenhagen, so on a
          # skipped run this file does not exist and there is nothing to do.
          if [ ! -f docs/index.html ]; then
            echo "No page was built (run was skipped) — nothing to commit."
            exit 0
          fi

          git config user.name "daily-brief"
          git config user.email "actions@github.com"
          git add docs/index.html

          if git diff --staged --quiet; then
            echo "Page unchanged — nothing to commit."
            exit 0
          fi

          git commit -m "Brief for $(date -u +%F)"
          # Another run may have pushed since checkout; rebase rather than fail.
          git pull --rebase --autostash
          git push
